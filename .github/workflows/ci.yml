name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      frontend: ${{ steps.changes.outputs.frontend }}
      backend: ${{ steps.changes.outputs.backend }}
      migrations: ${{ steps.changes.outputs.migrations }}

    steps:
      - uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            frontend:
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.js'
              - '**/*.jsx'
              - '**/*.css'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'vite.config.*'
              - 'jest.config.*'
              - 'tests-ts/**'
              - 'resources/**'
              - '.github/workflows/**'
            backend:
              - '**/*.php'
              - 'composer.json'
              - 'composer.lock'
              - 'phpunit.xml'
              - 'phpstan.neon'
              - 'phpstan-baseline.neon'
              - 'database/**'
              - 'scripts/**'
              - '.github/workflows/**'
            migrations:
              - 'database/migrations/**/*.php'
              - 'scripts/check-migration-identifiers.py'

  frontend:
    name: Frontend Checks
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check, lint, and test in parallel
        run: pnpm exec concurrently --kill-others-on-fail --names "tsc,eslint,jest" "pnpm run type-check" "pnpm run lint" "pnpm run test"

      - name: Build frontend
        run: pnpm run build

      - name: Upload frontend build artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: public/build/
          retention-days: 2

  backend:
    name: Backend Checks
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Check MySQL identifier lengths in migrations
        if: needs.changes.outputs.migrations == 'true' || github.event_name == 'push'
        run: python3 scripts/check-migration-identifiers.py

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend for PHP tests
        run: pnpm run build

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies (with dev)
        run: composer install --no-interaction --prefer-dist

      - name: Create .env for PHPStan
        run: cp .env.example .env

      - name: Cache PHPStan result cache
        uses: actions/cache@v5
        with:
          path: .phpstan-cache
          key: phpstan-${{ hashFiles('phpstan.neon', 'phpstan-baseline.neon', 'composer.lock') }}-${{ github.sha }}
          restore-keys: |
            phpstan-${{ hashFiles('phpstan.neon', 'phpstan-baseline.neon', 'composer.lock') }}-
            phpstan-

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress

      - name: Run PHPUnit
        run: php artisan test --compact

  test:
    name: Run Tests
    needs:
      - changes
      - frontend
      - backend
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check CI results
        run: |
          changes="${{ needs.changes.result }}"
          frontend="${{ needs.frontend.result }}"
          backend="${{ needs.backend.result }}"

          if [[ "$changes" == "failure" || "$changes" == "cancelled" ]]; then
            echo "Change detection failed: $changes"
            exit 1
          fi

          if [[ "$frontend" == "failure" || "$frontend" == "cancelled" ]]; then
            echo "Frontend checks failed: $frontend"
            exit 1
          fi

          if [[ "$backend" == "failure" || "$backend" == "cancelled" ]]; then
            echo "Backend checks failed: $backend"
            exit 1
          fi

          if [[ "$frontend" == "skipped" && "$backend" == "skipped" ]]; then
            echo "No frontend or backend paths changed."
          fi

          echo "Required checks passed."

  deploy:
    name: Deploy to Production
    needs:
      - test
      - frontend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.test.result == 'success' && needs.frontend.result == 'success'
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer (no dev)
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Download frontend build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: public/build/

      - name: Append to .htaccess
        run: cat htaccess-append.txt >> public/.htaccess

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Deploy with rsync
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" rsync -av --delete --exclude='.env' --exclude='phr-dicom' --exclude='ohif' \
            -e "ssh -o StrictHostKeyChecking=no" \
            app \
            bootstrap \
            config \
            database \
            public \
            resources \
            routes \
            storage \
            vendor \
            artisan \
            composer.json \
            composer.lock \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:~/bwh-php/

      - name: Run artisan migrate, config clear/cache on server
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} \
            "cd ~/bwh-php && /opt/cpanel/ea-php83/root/usr/bin/php artisan migrate --force && /opt/cpanel/ea-php83/root/usr/bin/php artisan config:clear && /opt/cpanel/ea-php83/root/usr/bin/php artisan config:cache"
