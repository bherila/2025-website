name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            frontend:
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.js'
              - '**/*.jsx'
              - '**/*.css'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'vite.config.*'
              - 'resources/**'
            backend:
              - '**/*.php'
              - 'composer.json'
              - 'composer.lock'
              - 'phpunit.xml'
              - 'phpstan.neon'
              - 'phpstan-baseline.neon'
              - 'database/**'
              - 'scripts/**'

      - name: Set up pnpm
        if: steps.changes.outputs.frontend == 'true' || steps.changes.outputs.backend == 'true' || github.event_name == 'push'
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Set up Node
        if: steps.changes.outputs.frontend == 'true' || steps.changes.outputs.backend == 'true' || github.event_name == 'push'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install Node dependencies
        if: steps.changes.outputs.frontend == 'true' || steps.changes.outputs.backend == 'true' || github.event_name == 'push'
        run: pnpm install --frozen-lockfile

      - name: Type-check, lint, and test in parallel
        if: steps.changes.outputs.frontend == 'true' || github.event_name == 'push'
        run: pnpm exec concurrently --kill-others-on-fail --names "tsc,eslint,jest" "pnpm run type-check" "pnpm run lint" "pnpm run test"

      - name: Build frontend
        if: steps.changes.outputs.frontend == 'true' || steps.changes.outputs.backend == 'true' || github.event_name == 'push'
        run: pnpm run build

      - name: Setup PHP
        if: steps.changes.outputs.backend == 'true' || github.event_name == 'push'
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Cache Composer dependencies
        if: steps.changes.outputs.backend == 'true' || github.event_name == 'push'
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies (with dev)
        if: steps.changes.outputs.backend == 'true' || github.event_name == 'push'
        run: composer install --no-interaction --prefer-dist

      - name: Check MySQL identifier lengths in migrations
        if: steps.changes.outputs.backend == 'true' || github.event_name == 'push'
        run: python3 scripts/check-migration-identifiers.py

      - name: Create .env for PHPStan
        if: steps.changes.outputs.backend == 'true' || github.event_name == 'push'
        run: cp .env.example .env

      - name: Cache PHPStan result cache
        if: steps.changes.outputs.backend == 'true' || github.event_name == 'push'
        uses: actions/cache@v5
        with:
          path: .phpstan-cache
          key: phpstan-${{ hashFiles('phpstan.neon', 'phpstan-baseline.neon', 'composer.lock') }}-${{ github.sha }}
          restore-keys: |
            phpstan-${{ hashFiles('phpstan.neon', 'phpstan-baseline.neon', 'composer.lock') }}-
            phpstan-

      - name: Run PHPStan
        if: steps.changes.outputs.backend == 'true' || github.event_name == 'push'
        run: vendor/bin/phpstan analyse --no-progress

      - name: Run PHPUnit (parallel)
        if: steps.changes.outputs.backend == 'true' || github.event_name == 'push'
        run: vendor/bin/paratest --processes=auto --configuration phpunit.xml

      - name: Upload frontend build artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: public/build/
          retention-days: 1

  deploy:
    name: Deploy to Production
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer (no dev)
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Download frontend build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: public/build/

      - name: Append to .htaccess
        run: cat htaccess-append.txt >> public/.htaccess

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Deploy with rsync
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" rsync -av --delete --exclude='.env' \
            -e "ssh -o StrictHostKeyChecking=no" \
            app \
            bootstrap \
            config \
            database \
            public \
            resources \
            routes \
            storage \
            vendor \
            artisan \
            composer.json \
            composer.lock \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:~/bwh-php/

      - name: Run artisan migrate, config clear/cache on server
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} \
            "cd ~/bwh-php && /opt/cpanel/ea-php83/root/usr/bin/php artisan migrate --force && /opt/cpanel/ea-php83/root/usr/bin/php artisan config:clear && /opt/cpanel/ea-php83/root/usr/bin/php artisan config:cache"
