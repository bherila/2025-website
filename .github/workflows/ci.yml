name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Install Composer dependencies (with dev)
        run: composer install --no-interaction --prefer-dist

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm run build

      - name: Run pnpm tests (Jest)
        run: pnpm run test

      - name: Run pnpm lint (ESLint)
        run: pnpm run lint

      - name: Run pnpm type-check (TypeScript)
        run: pnpm run type-check

      - name: Run PHPUnit
        run: vendor/bin/phpunit --configuration phpunit.xml

      - name: Upload frontend build artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: public/build/
          retention-days: 1

  deploy:
    name: Deploy to Production
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Install Composer (no dev)
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Download frontend build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: public/build/

      - name: Append to .htaccess
        run: cat htaccess-append.txt >> public/.htaccess

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Deploy with rsync
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" rsync -av --delete --exclude='.env' \
            -e "ssh -o StrictHostKeyChecking=no" \
            app \
            bootstrap \
            config \
            database \
            public \
            resources \
            routes \
            storage \
            vendor \
            artisan \
            composer.json \
            composer.lock \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:~/bwh-php/

      - name: Run artisan migrate, config clear/cache on server
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} \
            "cd ~/bwh-php && /opt/cpanel/ea-php83/root/usr/bin/php artisan migrate --force && /opt/cpanel/ea-php83/root/usr/bin/php artisan config:clear && /opt/cpanel/ea-php83/root/usr/bin/php artisan config:cache"
