name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      frontend: ${{ steps.changes.outputs.frontend }}
      backend: ${{ steps.changes.outputs.backend }}
      deploy_inputs: ${{ steps.changes.outputs.deploy_inputs }}
      migrations: ${{ steps.changes.outputs.migrations }}
      parking_pickup: ${{ steps.changes.outputs.parking_pickup }}
      marble_sort: ${{ steps.changes.outputs.marble_sort }}

    steps:
      - uses: actions/checkout@v6

      - name: Detect changed paths
        uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            frontend:
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.js'
              - '**/*.jsx'
              - '**/*.css'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'vite.config.*'
              - 'jest.config.*'
              - 'tests-ts/**'
              - 'resources/**'
              - '.github/workflows/**'
            backend:
              - '**/*.php'
              - 'composer.json'
              - 'composer.lock'
              - 'phpunit.xml'
              - 'phpstan.neon'
              - 'phpstan-baseline.neon'
              - 'database/**'
              - 'scripts/**'
              - '.github/workflows/**'
            deploy_inputs:
              - 'app/**'
              - 'artisan'
              - 'bootstrap/**'
              - 'composer.json'
              - 'composer.lock'
              - 'config/**'
              - 'database/**'
              - 'htaccess-append.txt'
              - 'public/**'
              - 'resources/**'
              - 'routes/**'
              - 'storage/**'
            migrations:
              - 'database/migrations/**/*.php'
              - 'scripts/check-migration-identifiers.py'
            parking_pickup:
              - 'resources/js/games/cars/**'
              - 'resources/js/games/_shared/**'
              - 'resources/js/games/PortraitGameShell.tsx'
              - 'resources/views/games/cars.blade.php'
              - 'tests/e2e/parking-pickup.spec.ts'
              - 'tests/Feature/CarsGamePageTest.php'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'vite.config.*'
              - 'jest.config.*'
              - '.github/workflows/**'
            marble_sort:
              - 'resources/js/games/marble-sort/**'
              - 'resources/js/games/_shared/**'
              - 'resources/js/games/PortraitGameShell.tsx'
              - 'resources/views/games/marble-sort.blade.php'
              - 'tests/Feature/MarbleSortGamePageTest.php'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'vite.config.*'
              - 'jest.config.*'
              - '.github/workflows/**'

  frontend-build:
    name: Frontend Build
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true' || needs.changes.outputs.deploy_inputs == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm + Node dependencies
        uses: ./.github/actions/setup-pnpm-node

      - name: Build frontend
        run: pnpm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v5
        with:
          name: frontend-build
          path: public/build/
          retention-days: 2

  frontend-static:
    name: Frontend Static Checks
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm + Node dependencies
        uses: ./.github/actions/setup-pnpm-node

      - name: Type-check and lint in parallel
        run: pnpm exec concurrently --kill-others-on-fail --names "tsc,eslint" "pnpm run type-check" "pnpm run lint"

  frontend-tests:
    name: Frontend App Tests
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm + Node dependencies
        uses: ./.github/actions/setup-pnpm-node

      - name: Run non-game Jest tests
        run: pnpm run test:ci:app

  parking-pickup-tests:
    name: Parking Pickup Tests
    needs: changes
    if: needs.changes.outputs.parking_pickup == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm + Node dependencies
        uses: ./.github/actions/setup-pnpm-node

      - name: Run Parking Pickup Jest tests
        run: pnpm run test:ci:parking-pickup

  marble-sort-tests:
    name: Marble Sort Tests
    needs: changes
    if: needs.changes.outputs.marble_sort == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm + Node dependencies
        uses: ./.github/actions/setup-pnpm-node

      - name: Run Marble Sort Jest tests
        run: pnpm run test:ci:marble-sort

  backend-static:
    name: Backend Static Checks
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Check MySQL identifier lengths in migrations
        if: needs.changes.outputs.migrations == 'true'
        run: python3 scripts/check-migration-identifiers.py

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies (with dev)
        run: composer install --no-interaction --prefer-dist

      - name: Create .env for PHPStan
        run: cp .env.example .env

      - name: Cache PHPStan result cache
        uses: actions/cache@v5
        with:
          path: .phpstan-cache
          key: phpstan-${{ hashFiles('phpstan.neon', 'phpstan-baseline.neon', 'composer.lock') }}-${{ github.sha }}
          restore-keys: |
            phpstan-${{ hashFiles('phpstan.neon', 'phpstan-baseline.neon', 'composer.lock') }}-
            phpstan-

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress

  backend-tests:
    name: Backend Tests
    needs:
      - changes
      - frontend-build
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Download frontend build artifact
        uses: actions/download-artifact@v5
        with:
          name: frontend-build
          path: public/build/

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies (with dev)
        run: composer install --no-interaction --prefer-dist

      - name: Create .env for tests
        run: cp .env.example .env

      - name: Run PHPUnit
        run: php artisan test --compact

  test:
    name: Run Tests
    needs:
      - changes
      - frontend-build
      - frontend-static
      - frontend-tests
      - parking-pickup-tests
      - marble-sort-tests
      - backend-static
      - backend-tests
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check CI results
        run: |
          changes="${{ needs.changes.result }}"
          frontend_build="${{ needs['frontend-build'].result }}"
          frontend_static="${{ needs['frontend-static'].result }}"
          frontend_tests="${{ needs['frontend-tests'].result }}"
          parking_pickup_tests="${{ needs['parking-pickup-tests'].result }}"
          marble_sort_tests="${{ needs['marble-sort-tests'].result }}"
          backend_static="${{ needs['backend-static'].result }}"
          backend_tests="${{ needs['backend-tests'].result }}"

          if [[ "$changes" == "failure" || "$changes" == "cancelled" ]]; then
            echo "Change detection failed: $changes"
            exit 1
          fi

          if [[ "$frontend_build" == "failure" || "$frontend_build" == "cancelled" ]]; then
            echo "Frontend build failed: $frontend_build"
            exit 1
          fi

          if [[ "$frontend_static" == "failure" || "$frontend_static" == "cancelled" ]]; then
            echo "Frontend static checks failed: $frontend_static"
            exit 1
          fi

          if [[ "$frontend_tests" == "failure" || "$frontend_tests" == "cancelled" ]]; then
            echo "Frontend app tests failed: $frontend_tests"
            exit 1
          fi

          if [[ "$parking_pickup_tests" == "failure" || "$parking_pickup_tests" == "cancelled" ]]; then
            echo "Parking Pickup tests failed: $parking_pickup_tests"
            exit 1
          fi

          if [[ "$marble_sort_tests" == "failure" || "$marble_sort_tests" == "cancelled" ]]; then
            echo "Marble Sort tests failed: $marble_sort_tests"
            exit 1
          fi

          if [[ "$backend_static" == "failure" || "$backend_static" == "cancelled" ]]; then
            echo "Backend static checks failed: $backend_static"
            exit 1
          fi

          if [[ "$backend_tests" == "failure" || "$backend_tests" == "cancelled" ]]; then
            echo "Backend tests failed: $backend_tests"
            exit 1
          fi

          if [[ "$frontend_build" == "skipped" && "$frontend_static" == "skipped" && "$frontend_tests" == "skipped" && "$parking_pickup_tests" == "skipped" && "$marble_sort_tests" == "skipped" && "$backend_static" == "skipped" && "$backend_tests" == "skipped" ]]; then
            echo "No frontend or backend paths changed."
          fi

          echo "Required checks passed."

  deploy:
    name: Deploy to Production
    needs:
      - test
      - frontend-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.test.result == 'success' && needs['frontend-build'].result == 'success'
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer (no dev)
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Download frontend build artifact
        uses: actions/download-artifact@v5
        with:
          name: frontend-build
          path: public/build/

      - name: Append to .htaccess
        run: cat htaccess-append.txt >> public/.htaccess

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Deploy with rsync
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" rsync -av --delete --exclude='.env' --exclude='phr-dicom' --exclude='ohif' \
            -e "ssh -o StrictHostKeyChecking=no" \
            app \
            bootstrap \
            config \
            database \
            public \
            resources \
            routes \
            storage \
            vendor \
            artisan \
            composer.json \
            composer.lock \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:~/bwh-php/

      - name: Run artisan migrate, config clear/cache on server
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} \
            "cd ~/bwh-php && /opt/cpanel/ea-php83/root/usr/bin/php artisan migrate --force && /opt/cpanel/ea-php83/root/usr/bin/php artisan config:clear && /opt/cpanel/ea-php83/root/usr/bin/php artisan config:cache"
