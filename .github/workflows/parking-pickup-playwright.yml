name: Parking Pickup Playwright

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Optional deployed URL to test. Leave blank to build this branch and serve it locally.
        required: false
        default: ''

concurrency:
  group: parking-pickup-playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  parking-pickup:
    name: Parking Pickup checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set Playwright target
        env:
          INPUT_BASE_URL: ${{ inputs.base_url }}
        run: |
          if [ -n "$INPUT_BASE_URL" ]; then
            echo "PLAYWRIGHT_BASE_URL=$INPUT_BASE_URL" >> "$GITHUB_ENV"
            echo "RUN_LOCAL_APP=false" >> "$GITHUB_ENV"
          else
            echo "PLAYWRIGHT_BASE_URL=http://127.0.0.1:8000" >> "$GITHUB_ENV"
            echo "RUN_LOCAL_APP=true" >> "$GITHUB_ENV"
          fi

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Setup PHP
        if: env.RUN_LOCAL_APP == 'true'
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Cache Composer dependencies
        if: env.RUN_LOCAL_APP == 'true'
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        if: env.RUN_LOCAL_APP == 'true'
        run: composer install --no-interaction --prefer-dist

      - name: Build frontend
        if: env.RUN_LOCAL_APP == 'true'
        run: pnpm run build

      - name: Create local app environment
        if: env.RUN_LOCAL_APP == 'true'
        run: |
          cp .env.example .env
          {
            echo "APP_ENV=testing"
            echo "APP_URL=http://127.0.0.1:8000"
            echo "DB_CONNECTION=sqlite"
            echo "DB_DATABASE=${GITHUB_WORKSPACE}/database/database.sqlite"
          } >> .env
          touch database/database.sqlite
          php artisan key:generate --no-interaction

      - name: Start local Laravel server
        if: env.RUN_LOCAL_APP == 'true'
        run: |
          php artisan serve --host=127.0.0.1 --port=8000 > storage/logs/playwright-server.log 2>&1 &
          echo "$!" > /tmp/parking-pickup-server.pid

          for attempt in {1..30}; do
            if curl --silent --fail "$PLAYWRIGHT_BASE_URL/games/parking-pickup" > /dev/null; then
              exit 0
            fi

            sleep 1
          done

          cat storage/logs/playwright-server.log
          exit 1

      - name: Run Parking Pickup Playwright checks
        run: pnpm run test:e2e:parking-pickup

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: parking-pickup-playwright-report
          path: |
            playwright-report/
            test-results/playwright/
            storage/logs/playwright-server.log
          if-no-files-found: ignore
          retention-days: 7
