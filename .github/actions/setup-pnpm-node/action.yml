name: Setup pnpm and Node
description: Install pnpm, configure Node.js, and install dependencies
runs:
  using: composite
  steps:
    - name: Set up pnpm
      uses: pnpm/action-setup@v5
      with:
        version: 10

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'pnpm'

    - name: Install Node dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
